<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setter IA PRO | Convierte más, sin estrés</title>
  <meta name="description" content="El primer Setter IA diseñado específicamente por y para Entrenadores, Nutricionistas y Fisioterapeutas Online." />
  <link rel="icon" type="image/png" href="/logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          colors: {
            background: '#04070A',
            surface: { DEFAULT: '#0F131A', lighter: '#1A1F29', glass: 'rgba(15, 19, 26, 0.7)' },
            primary: { 500: '#6366f1', 600: '#4f46e5' },
            brand: {
              glow: 'rgba(99, 102, 241, 0.15)',
              violet: '#8B5CF6',
              cyan: '#06B6D4',
              emerald: '#10B981',
            }
          },
          animation: {
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
    body { font-family: 'Outfit', sans-serif; overflow-x: hidden; }
    .glass-card {
      background: rgba(15, 19, 26, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(139, 92, 246, 0.25);
    }
    .premium-gradient-text {
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    @keyframes shimmer { 100% { transform: translateX(100%); } }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.2); }
  </style>
</head>
<body class="bg-background text-slate-100 antialiased selection:bg-indigo-500 selection:text-white">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
